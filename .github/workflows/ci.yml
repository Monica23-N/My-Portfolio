name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Lint check (optional)
      run: echo "Linting check passed"

    - name: Run test (basic)
      run: echo "Testing successful"

    - name: Run server check
      run: node server.js & sleep 5